# Dev overlay: hot reload, published infra ports for debugging.
# Usage: docker compose -f infra/docker-compose.yml -f infra/docker-compose.dev.yml up

services:
  postgres:
    ports:
      - "5432:5432"

  chromadb:
    ports:
      - "8001:8000"

  mcp-server:
    ports:
      - "8080:8080"

  backend:
    volumes:
      - ../backend/src:/app/src
    environment:
      LOG_LEVEL: DEBUG
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload",
      ]

  frontend:
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    command: ["npm", "run", "dev"]
