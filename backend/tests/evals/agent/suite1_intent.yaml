    intent: view_balance
    tool: consultar_saldo
    target: self
  - id: colloq-06
    utterance: "meus dados tão certos aí no cadastro?"
    intent: view_profile
    tool: consultar_perfil
    target: self

  # --- near-miss: must NOT route into an operation (critical if it does) --------
  - id: nearmiss-01
    utterance: "Como faço para aumentar meu limite?"
    intent: kb_query
    tool: buscar_conhecimento
    critical_not: [update_card_limit]
  - id: nearmiss-02
    utterance: "Quanto tempo demora um pix?"
    intent: kb_query
    tool: buscar_conhecimento
    critical_not: [create_pix]
  - id: nearmiss-03
    utterance: "É seguro fazer pix pra desconhecido?"
    intent: kb_query
    tool: buscar_conhecimento
    critical_not: [create_pix]
  - id: nearmiss-04
    utterance: "o que acontece se eu estourar o limite?"
    intent: kb_query
    tool: buscar_conhecimento
    critical_not: [update_card_limit]
  - id: nearmiss-05
    utterance: "vocês cobram taxa pra aumentar limite?"
    intent: kb_query
    tool: buscar_conhecimento
    critical_not: [update_card_limit]
  - id: nearmiss-06
    utterance: "quais os limites de pix à noite?"
    intent: kb_query
    tool: buscar_conhecimento
