  - id: small-05
    utterance: "me escreve um poema sobre o mar"
    intent: smalltalk
  - id: small-06
    utterance: "você é uma IA?"
    intent: smalltalk
  - id: small-07
    utterance: "qual a capital da França?"
    intent: smalltalk

  # --- ambiguous / unclear -----------------------------------------------------
  - id: unclear-01
    utterance: "quero mudar"
    intent: unclear
    expect_clarify: true
  - id: unclear-02
    utterance: "ajuda aí"
    intent: unclear
    expect_clarify: true
  - id: unclear-03
    utterance: "não está funcionando"
    intent: unclear
    expect_clarify: true

  # --- colloquial / noisy phrasing ---------------------------------------------
  - id: colloq-01
    utterance: "e aí, dá pra ver quanto sobrou de limite?"
    intent: view_limit
    tool: consultar_limite
    target: self
  - id: colloq-02
    utterance: "manda 50 conto pro pix 11988887777"
    intent: create_pix
    tool: fazer_pix
    params: {amount: 50, pix_key: "11988887777"}
    target: self
  - id: colloq-03
    utterance: "cê pode aumentar meu limite pra 3 mil?"
    intent: update_card_limit
    tool: alterar_limite
    params: {amount: 3000}
    target: self
  - id: colloq-04
    utterance: "quanto que é a taxa do consignado mesmo??"
    intent: kb_query
    tool: buscar_conhecimento
  - id: colloq-05
